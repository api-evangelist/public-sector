name: Public Sector
description: >-
  Industry-vertical index for the public-sector / government API landscape
  across U.S. federal, state, and local levels. Catalogs the federal API
  gateway api.data.gov (operated by GSA's Technology Transformation Services
  under the Open Government Data Act of 2018, used by 25 agencies for over
  450 APIs), the catalog.data.gov CKAN metadata catalog, headline federal
  programmatic surfaces (Regulations.gov, Federal Register, GovInfo, SAM.gov,
  USAspending.gov, Treasury Fiscal Data, Congress.gov, FEC openFEC,
  api.weather.gov, api.nasa.gov, Census Data API, Bureau of Economic
  Analysis), state and local infrastructure (Socrata / Tyler Data and
  Insights, Tyler Technologies courts/ERP/public-safety stack, OpenGov
  ERP/budgeting/permitting cloud), and the civic-tech layer
  (OpenStates / Plural Policy, GovTrack, Open Civic Data). Cross-references
  Kin Lane's 2026-05-05 roundup of 211 U.S. federal agencies and their APIs
  on apievangelist.com. The catalog focuses on the data-schema shape of a
  government dataset / agency / regulation record so that civic-tech and
  enterprise consumers can normalize across federal, state, and local
  publishers.
url: https://github.com/api-evangelist/public-sector
humanURL: https://github.com/api-evangelist/public-sector
image: ''
tags:
  - Public Sector
  - Government
  - Federal
  - State
  - Local
  - Civic Tech
  - Open Data
  - Regulations
  - Procurement
  - Open Government
  - Topic
